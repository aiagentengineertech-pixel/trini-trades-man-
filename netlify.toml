# Netlify deploy config for the Expo (web) build of the Trini Tradesman app.
# The app lives in the `mobile/` folder; Expo exports a single-page web app to dist/.
[build]
  base = "mobile"
  command = "npx expo export -p web && node scripts/inject-pwa.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every route serves index.html so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
